<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rule Editor Page — Wireframes</title>
<style>
  :root {
    --bg-primary: #0a0a0f;
    --bg-secondary: #12121a;
    --bg-tertiary: #1a1a2e;
    --bg-card: #16162a;
    --bg-input: #1e1e35;
    --border: #2a2a4a;
    --border-focus: #6366f1;
    --text-primary: #e2e8f0;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --accent: #6366f1;
    --accent-hover: #818cf8;
    --accent-bg: rgba(99,102,241,0.1);
    --success: #22c55e;
    --success-bg: rgba(34,197,94,0.1);
    --warning: #f59e0b;
    --warning-bg: rgba(245,158,11,0.1);
    --danger: #ef4444;
    --danger-bg: rgba(239,68,68,0.1);
    --purple: #a855f7;
    --purple-bg: rgba(168,85,247,0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg-primary); color: var(--text-primary); font-family: 'Inter', -apple-system, system-ui, sans-serif; }

  .wireframe-container { max-width: 1440px; margin: 0 auto; padding: 32px; }
  .wireframe-title { font-size: 14px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 8px; }
  .wireframe-subtitle { font-size: 24px; font-weight: 700; color: var(--text-primary); margin-bottom: 32px; }

  /* Tab switcher */
  .tabs { display: flex; gap: 4px; margin-bottom: 32px; background: var(--bg-secondary); border-radius: 12px; padding: 4px; width: fit-content; }
  .tab { padding: 10px 24px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; color: var(--text-secondary); border: none; background: transparent; transition: all 0.2s; }
  .tab.active { background: var(--accent); color: white; }
  .tab:hover:not(.active) { color: var(--text-primary); background: var(--bg-tertiary); }

  .view { display: none; }
  .view.active { display: block; }

  /* Page frame */
  .page-frame { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
  
  /* Top bar */
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid var(--border); background: var(--bg-secondary); }
  .topbar-left { display: flex; align-items: center; gap: 16px; }
  .back-btn { display: flex; align-items: center; gap: 6px; color: var(--text-secondary); font-size: 14px; cursor: pointer; background: none; border: none; padding: 6px 10px; border-radius: 6px; }
  .back-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }
  .back-btn svg { width: 16px; height: 16px; }
  .topbar-title { font-size: 16px; font-weight: 600; }
  .topbar-badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
  .badge-create { background: var(--accent-bg); color: var(--accent); }
  .badge-edit { background: var(--warning-bg); color: var(--warning); }
  .topbar-actions { display: flex; gap: 8px; }

  /* Buttons */
  .btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid transparent; display: inline-flex; align-items: center; gap: 6px; transition: all 0.15s; }
  .btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-outline { background: transparent; color: var(--text-secondary); border-color: var(--border); }
  .btn-outline:hover { background: var(--bg-tertiary); color: var(--text-primary); border-color: var(--text-muted); }
  .btn-ghost { background: transparent; color: var(--text-secondary); border: none; padding: 6px 10px; }
  .btn-ghost:hover { background: var(--bg-tertiary); color: var(--text-primary); }
  .btn-danger { background: transparent; color: var(--danger); border-color: var(--danger); }
  .btn-danger:hover { background: var(--danger-bg); }
  .btn svg { width: 15px; height: 15px; }
  .btn-lg { padding: 12px 24px; font-size: 14px; border-radius: 10px; }
  .btn-icon { padding: 8px; border-radius: 8px; }

  /* Split layout */
  .split-layout { display: grid; grid-template-columns: 1fr 420px; min-height: calc(100vh - 200px); }

  /* Left panel — Rule form */
  .left-panel { padding: 28px; overflow-y: auto; border-right: 1px solid var(--border); }
  .panel-header { margin-bottom: 24px; }
  .panel-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 4px; }
  .panel-title { font-size: 18px; font-weight: 700; }

  /* Form fields */
  .form-group { margin-bottom: 20px; }
  .form-label { display: block; font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
  .form-label .required { color: var(--danger); margin-left: 2px; }
  .form-hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .form-input { width: 100%; padding: 10px 14px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-size: 14px; outline: none; transition: border-color 0.15s; }
  .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg); }
  .form-input::placeholder { color: var(--text-muted); }
  .form-input.error { border-color: var(--danger); }
  .form-error { font-size: 12px; color: var(--danger); margin-top: 4px; }
  .form-textarea { min-height: 220px; resize: vertical; font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.6; }
  .form-textarea-sm { min-height: 80px; resize: vertical; font-size: 13px; line-height: 1.5; }

  /* Row layout */
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  /* Applicability chips */
  .chip-group { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text-secondary); transition: all 0.15s; }
  .chip:hover { border-color: var(--text-muted); color: var(--text-primary); }
  .chip.selected { background: var(--accent); color: white; border-color: var(--accent); }
  .chip-check { margin-right: 4px; }

  /* Color picker */
  .color-group { display: flex; flex-wrap: wrap; gap: 8px; }
  .color-option { display: flex; align-items: center; gap: 8px; padding: 8px 14px; border-radius: 8px; border: 2px solid var(--border); cursor: pointer; background: transparent; transition: all 0.15s; }
  .color-option:hover { border-color: var(--text-muted); }
  .color-option.selected { border-color: var(--accent); background: var(--accent-bg); }
  .color-dot { width: 14px; height: 14px; border-radius: 50%; }
  .color-label { font-size: 12px; color: var(--text-secondary); }
  .color-option.selected .color-label { color: var(--text-primary); }

  /* Tags */
  .tags-container { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .tag { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 6px; font-size: 12px; color: var(--text-secondary); }
  .tag-remove { cursor: pointer; color: var(--text-muted); font-size: 14px; line-height: 1; }
  .tag-remove:hover { color: var(--danger); }

  /* Checkbox */
  .checkbox-row { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: var(--bg-tertiary); border-radius: 8px; border: 1px solid var(--border); }
  .checkbox { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }
  .checkbox-label { font-size: 13px; color: var(--text-secondary); cursor: pointer; }

  /* Character counter */
  .char-counter { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; }
  .char-count { font-size: 12px; color: var(--text-muted); }
  .preview-toggle { font-size: 12px; color: var(--accent); cursor: pointer; background: none; border: none; }
  .preview-toggle:hover { text-decoration: underline; }

  /* Right panel — AI assistant */
  .right-panel { display: flex; flex-direction: column; background: var(--bg-tertiary); }
  .right-panel-header { padding: 20px 24px; border-bottom: 1px solid var(--border); }
  .right-panel-body { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; }

  /* AI status badge */
  .ai-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; }
  .ai-badge-idle { background: var(--purple-bg); color: var(--purple); }
  .ai-badge-working { background: var(--accent-bg); color: var(--accent); }
  .ai-badge-done { background: var(--success-bg); color: var(--success); }
  .ai-dot { width: 6px; height: 6px; border-radius: 50%; }
  .ai-dot-idle { background: var(--purple); }
  .ai-dot-working { background: var(--accent); animation: pulse 1.5s infinite; }
  .ai-dot-done { background: var(--success); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* Rule summary card (edit mode) */
  .rule-summary { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 18px; }
  .rule-summary-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .rule-summary-dot { width: 10px; height: 10px; border-radius: 50%; }
  .rule-summary-name { font-size: 15px; font-weight: 600; }
  .rule-summary-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 12px; }
  .rule-summary-meta { display: flex; flex-wrap: wrap; gap: 8px; }
  .rule-summary-chip { font-size: 11px; padding: 3px 10px; border-radius: 12px; background: var(--bg-tertiary); color: var(--text-muted); border: 1px solid var(--border); }
  .rule-summary-divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
  .rule-summary-section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); margin-bottom: 8px; }
  .rule-summary-content-preview { font-size: 12px; color: var(--text-secondary); line-height: 1.6; background: var(--bg-input); border-radius: 8px; padding: 12px; max-height: 120px; overflow-y: auto; white-space: pre-wrap; font-family: 'JetBrains Mono', monospace; }

  /* AI Prompt area */
  .ai-prompt-section { flex: 1; display: flex; flex-direction: column; }
  .ai-prompt-label { font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .ai-prompt-label svg { width: 14px; height: 14px; color: var(--purple); }
  .ai-prompt-textarea { flex: 1; min-height: 160px; padding: 14px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 10px; color: var(--text-primary); font-size: 13px; line-height: 1.6; resize: none; outline: none; transition: border-color 0.15s; }
  .ai-prompt-textarea:focus { border-color: var(--purple); box-shadow: 0 0 0 3px var(--purple-bg); }
  .ai-prompt-textarea::placeholder { color: var(--text-muted); }
  .ai-prompt-actions { display: flex; gap: 8px; margin-top: 12px; }
  .btn-ai { background: linear-gradient(135deg, var(--purple), var(--accent)); color: white; border: none; }
  .btn-ai:hover { opacity: 0.9; }
  .btn-ai:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-ai-stop { background: var(--danger-bg); color: var(--danger); border: 1px solid var(--danger); }

  /* AI Suggestions */
  .ai-suggestions { margin-top: 8px; }
  .ai-suggestions-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); margin-bottom: 8px; }
  .ai-suggestion-item { display: flex; align-items: flex-start; gap: 8px; padding: 10px 12px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; transition: all 0.15s; margin-bottom: 6px; }
  .ai-suggestion-item:hover { border-color: var(--accent); background: var(--accent-bg); }
  .ai-suggestion-icon { color: var(--accent); font-size: 14px; margin-top: 1px; }
  .ai-suggestion-text { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
  .ai-suggestion-text strong { color: var(--text-primary); font-weight: 500; }

  /* AI Response area */
  .ai-response { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-top: 12px; }
  .ai-response-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .ai-response-label { font-size: 12px; font-weight: 600; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
  .ai-response-actions { display: flex; gap: 4px; }
  .ai-response-content { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
  .ai-response-content .highlight { color: var(--accent); font-weight: 500; }

  /* Loading shimmer */
  .shimmer { background: linear-gradient(90deg, var(--bg-tertiary) 25%, var(--bg-input) 50%, var(--bg-tertiary) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 6px; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  .shimmer-line { height: 12px; margin-bottom: 8px; }
  .shimmer-line:last-child { width: 60%; margin-bottom: 0; }

  /* Empty state */
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 24px; text-align: center; }
  .empty-icon { width: 48px; height: 48px; border-radius: 12px; background: var(--accent-bg); display: flex; align-items: center; justify-content: center; margin-bottom: 16px; font-size: 22px; }
  .empty-title { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
  .empty-desc { font-size: 12px; color: var(--text-muted); line-height: 1.5; max-width: 280px; }

  /* Diff indicator */
  .diff-indicator { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 500; }
  .diff-added { background: var(--success-bg); color: var(--success); }
  .diff-removed { background: var(--danger-bg); color: var(--danger); }
  .diff-modified { background: var(--warning-bg); color: var(--warning); }

  /* Footer bar */
  .footer-bar { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; border-top: 1px solid var(--border); background: var(--bg-secondary); }
  .footer-left { display: flex; align-items: center; gap: 12px; }
  .footer-hint { font-size: 12px; color: var(--text-muted); }
  .footer-right { display: flex; gap: 8px; }

  /* Annotation callouts */
  .annotation { position: relative; }
  .annotation::after { content: attr(data-note); position: absolute; right: -8px; top: 50%; transform: translate(100%, -50%); background: var(--accent); color: white; font-size: 11px; font-weight: 500; padding: 4px 10px; border-radius: 6px; white-space: nowrap; z-index: 10; }
  .annotation::before { content: ''; position: absolute; right: 0; top: 50%; transform: translate(0, -50%); border: 5px solid transparent; border-right-color: var(--accent); z-index: 10; }

  /* Scrollbar styling */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  /* Mobile note */
  .mobile-note { display: flex; align-items: center; gap: 8px; padding: 10px 16px; background: var(--warning-bg); border: 1px solid var(--warning); border-radius: 8px; margin-bottom: 20px; font-size: 12px; color: var(--warning); }
</style>
</head>
<body>
<div class="wireframe-container">
  <div class="wireframe-title
